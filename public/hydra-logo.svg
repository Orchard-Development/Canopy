<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- 3-tone flat palette: deep navy #0A0F1E, teal #0D7377, bright cyan #00D4AA -->

  <!-- Base/body - central trunk rising from bottom -->
  <path d="M236 512 L236 320 Q236 280 256 260 Q276 280 276 320 L276 512 Z" fill="#0A0F1E"/>

  <!-- Central spine glow -->
  <path d="M248 512 L248 330 Q248 295 256 275 Q264 295 264 330 L264 512 Z" fill="#0D7377"/>

  <!-- Left neck - curves out to the left -->
  <path d="M236 320 Q200 300 170 240 Q155 210 140 180 Q130 160 120 150 Q110 142 100 140 L100 140 Q115 130 130 135 Q145 140 155 155 Q170 175 185 210 Q205 260 236 290 Z" fill="#0A0F1E"/>

  <!-- Center neck - rises straight up -->
  <path d="M240 280 Q248 240 256 200 Q264 240 272 280 Z" fill="#0A0F1E"/>

  <!-- Right neck - curves out to the right -->
  <path d="M276 320 Q312 300 342 240 Q357 210 372 180 Q382 160 392 150 Q402 142 412 140 L412 140 Q397 130 382 135 Q367 140 357 155 Q342 175 327 210 Q307 260 276 290 Z" fill="#0A0F1E"/>

  <!-- Left head -->
  <g>
    <!-- Head shape -->
    <circle cx="92" cy="120" r="40" fill="#0D7377"/>
    <!-- Inner detail -->
    <circle cx="92" cy="120" r="24" fill="#0A0F1E"/>
    <!-- Eye / node -->
    <circle cx="92" cy="115" r="8" fill="#00D4AA"/>
    <!-- Crown spikes -->
    <path d="M68 90 L72 75 L80 88 Z" fill="#00D4AA"/>
    <path d="M84 82 L92 65 L100 82 Z" fill="#00D4AA"/>
    <path d="M104 88 L112 75 L116 90 Z" fill="#00D4AA"/>
  </g>

  <!-- Center head (largest, dominant) -->
  <g>
    <circle cx="256" cy="100" r="52" fill="#0D7377"/>
    <circle cx="256" cy="100" r="32" fill="#0A0F1E"/>
    <circle cx="256" cy="94" r="10" fill="#00D4AA"/>
    <!-- Crown spikes -->
    <path d="M224 62 L230 42 L240 58 Z" fill="#00D4AA"/>
    <path d="M244 52 L256 30 L268 52 Z" fill="#00D4AA"/>
    <path d="M272 58 L282 42 L288 62 Z" fill="#00D4AA"/>
  </g>

  <!-- Right head -->
  <g>
    <circle cx="420" cy="120" r="40" fill="#0D7377"/>
    <circle cx="420" cy="120" r="24" fill="#0A0F1E"/>
    <circle cx="420" cy="115" r="8" fill="#00D4AA"/>
    <!-- Crown spikes -->
    <path d="M396 90 L400 75 L408 88 Z" fill="#00D4AA"/>
    <path d="M412 82 L420 65 L428 82 Z" fill="#00D4AA"/>
    <path d="M432 88 L440 75 L444 90 Z" fill="#00D4AA"/>
  </g>

  <!-- Connection lines (MQTT bus representation) -->
  <line x1="132" y1="120" x2="204" y2="100" stroke="#00D4AA" stroke-width="2" opacity="0.5"/>
  <line x1="308" y1="100" x2="380" y2="120" stroke="#00D4AA" stroke-width="2" opacity="0.5"/>
  <line x1="92" y1="160" x2="256" y2="200" stroke="#00D4AA" stroke-width="1.5" opacity="0.3"/>
  <line x1="420" y1="160" x2="256" y2="200" stroke="#00D4AA" stroke-width="1.5" opacity="0.3"/>

  <!-- Signal dots along the bus lines -->
  <circle cx="168" cy="110" r="3" fill="#00D4AA" opacity="0.7"/>
  <circle cx="344" cy="110" r="3" fill="#00D4AA" opacity="0.7"/>
  <circle cx="174" cy="178" r="2.5" fill="#00D4AA" opacity="0.4"/>
  <circle cx="338" cy="178" r="2.5" fill="#00D4AA" opacity="0.4"/>

  <!-- Root tendrils (repos/persistence) -->
  <path d="M236 460 Q220 470 200 490 Q190 500 185 512" stroke="#0D7377" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M276 460 Q292 470 312 490 Q322 500 327 512" stroke="#0D7377" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M246 480 Q236 495 230 512" stroke="#0D7377" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M266 480 Q276 495 282 512" stroke="#0D7377" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtle scales on the central trunk -->
  <path d="M242 380 Q256 370 270 380" stroke="#0D7377" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M240 400 Q256 390 272 400" stroke="#0D7377" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M238 420 Q256 410 274 420" stroke="#0D7377" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M238 440 Q256 430 274 440" stroke="#0D7377" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>